<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0b0b;
    font-family:'Cinzel',serif;
}

.envelope{
    width:90%;
    max-width:420px;
    background:#111;
    border:2px solid #d4af37;
    border-radius:24px;
    padding:25px;
    text-align:center;
    box-shadow:
        0 0 25px rgba(212,175,55,.25),
        inset 0 0 20px rgba(212,175,55,.08);
}

.cover{
    width:100%;
    border-radius:12px;
    border:1px solid rgba(212,175,55,.4);
}

.small{
    color:#d4af37;
    letter-spacing:3px;
    margin-top:20px;
    font-size:12px;
}

.title{
    color:white;
    font-size:28px;
    margin:15px 0;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:14px 35px;
    text-decoration:none;
    background:#d4af37;
    color:#111;
    border-radius:50px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px rgba(212,175,55,.6);
}
</style>
</head>
<body>

<div class="envelope">


    <div class="small">THE WEDDING OF</div>

    <div class="title">
        Agung & Ageng
    </div>

    <!-- GANTI undangan.jpg dengan gambar undangan -->
    <a href="images.png" class="btn">
        Buka Undangan
    </a>

</div>

</body>
</html>
